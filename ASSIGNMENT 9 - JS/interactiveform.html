<!DOCTYPE html>
<html>
<head>
    <title>Interactive Form</title>
    <link rel="stylesheet" href="interactiveform.css">
</head>

<body>

    <div class="container">
        <h1>User Form</h1>

        <form id="myForm">

            <label>Name:</label><br>
            <input type="text" id="name"><br><br>

            <label>Email:</label><br>
            <input type="text" id="email"><br><br>

            <button type="submit">Submit</button>

        </form>

        <p id="message"></p>
    </div>

    <script src="interactiveform.js"></script>

</body>
</html>
